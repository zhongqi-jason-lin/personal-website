<!-- JSON-LD structured data (schema.org). @graph lets Person and each
     ScholarlyArticle be first-class entities that cross-reference each other
     by @id — the pattern Google Scholar prefers for author→paper linking.
     Fill in your own Person fields and publication list; ScholarlyArticle
     entries are optional but improve academic-search discoverability. -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Person",
      "@id": "https://your-domain.example/#person",
      "name": "Jane Q. Example",
      "alternateName": ["Jane Example", "J. Example"],
      "jobTitle": "PhD Candidate in [Field]",
      "description": "One-paragraph bio describing your research focus and approach.",
      "url": "https://your-domain.example/",
      "image": "https://your-domain.example/assets/headshot.svg",
      "email": "mailto:jane.example@your-institution.edu",
      "worksFor": {
        "@type": "ResearchOrganization",
        "name": "Example Lab",
        "url": "https://your-lab.example.org/",
        "parentOrganization": {
          "@type": "CollegeOrUniversity",
          "name": "Example University"
        }
      },
      "affiliation": {
        "@type": "CollegeOrUniversity",
        "name": "Example University",
        "department": "Department of [Field]"
      },
      "alumniOf": [
        {"@type": "CollegeOrUniversity", "name": "Prior University"},
        {"@type": "CollegeOrUniversity", "name": "Undergrad Institution"}
      ],
      "knowsAbout": [
        "Research topic 1",
        "Research topic 2",
        "Methodological skill 1",
        "Methodological skill 2"
      ],
      "sameAs": [
        "https://scholar.google.com/citations?user=YOUR_ID",
        "https://www.linkedin.com/in/your-linkedin-handle",
        "https://github.com/your-github-handle"
      ]
    },
    {
      "@type": "ScholarlyArticle",
      "headline": "First publication title",
      "datePublished": "2024",
      "isPartOf": {"@type": "Periodical", "name": "Journal Name"},
      "url": "https://doi.org/10.xxxx/example1",
      "author": [
        {"@id": "https://your-domain.example/#person"},
        {"@type": "Person", "name": "Second Author"},
        {"@type": "Person", "name": "Senior Author"}
      ]
    },
    {
      "@type": "ScholarlyArticle",
      "headline": "Second publication title",
      "datePublished": "2022",
      "isPartOf": {"@type": "Periodical", "name": "Journal Name"},
      "url": "https://doi.org/10.xxxx/example2",
      "author": [
        {"@type": "Person", "name": "First Author"},
        {"@id": "https://your-domain.example/#person"},
        {"@type": "Person", "name": "Senior Author"}
      ]
    }
  ]
}
</script>
<!-- All typography is Apple's SF family, resolved via the system font stack — no webfont download. -->
<script>
  // Set user's saved theme before first paint (prevents flash).
  // If the saved preference already matches the OS, discard it — that lets the
  // @media (prefers-color-scheme) rule drive the colors again (auto-follow OS).
  (function(){
    try{
      var t=localStorage.getItem('theme');
      if(t!=='light'&&t!=='dark') return;
      var osDark=matchMedia('(prefers-color-scheme: dark)').matches;
      if((t==='dark')===osDark){ localStorage.removeItem('theme'); return; }
      document.documentElement.setAttribute('data-theme',t);
    }catch(e){}
  })();
</script>
<style>
  :root{
    /* SF theme: all three roles resolve to Apple's SF family via the system stack.
       --sf: body/UI (SF Pro Text at small sizes, SF Pro Display at large sizes — browser picks via optical sizing).
       --display: same stack, used where we want heavier weight / tighter tracking for headings.
       --mono: SF Mono on macOS, falls back to Menlo/Consolas elsewhere. */
    --sf:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Helvetica Neue",system-ui,sans-serif;
    --serif:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Helvetica Neue",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --paper:#fafaf8; --paper-2:#f0efe9; --ink:#111; --ink-soft:#555; --ink-faint:#6f6d66; --rule:#e5e3dc;
    /* Light accent: editorial blue (5.6:1 on paper, passes WCAG AA). */
    --accent:oklch(0.50 0.18 252); --accent-soft:oklch(0.50 0.18 252 / 0.15);
  }
  /* Follow OS preference by default */
  @media (prefers-color-scheme: dark){
    :root{--paper:#0f0f10;--paper-2:#1a1a1c;--ink:#f4f3ef;--ink-soft:#b5b2aa;--ink-faint:#8a877e;--rule:#2a2a2c;
      /* Dark accent: cyan — 8.1:1 on near-black. */
      --accent:oklch(0.72 0.12 205);--accent-soft:oklch(0.72 0.12 205 / 0.15);}
  }
  /* Explicit user overrides — higher specificity than :root, beat the media query */
  :root[data-theme="light"]{--paper:#fafaf8;--paper-2:#f0efe9;--ink:#111;--ink-soft:#555;--ink-faint:#6f6d66;--rule:#e5e3dc;--accent:oklch(0.50 0.18 252);--accent-soft:oklch(0.50 0.18 252 / 0.15);}
  :root[data-theme="dark"]{--paper:#0f0f10;--paper-2:#1a1a1c;--ink:#f4f3ef;--ink-soft:#b5b2aa;--ink-faint:#8a877e;--rule:#2a2a2c;--accent:oklch(0.72 0.12 205);--accent-soft:oklch(0.72 0.12 205 / 0.15);}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sf);font-size:17.5px;line-height:1.55;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.011em;font-optical-sizing:auto;text-rendering:optimizeLegibility;-webkit-tap-highlight-color:transparent}

  /* Scroll-boundary edge-hit pulse — a soft blue oval blooms at top/bottom
     the moment scroll reaches the limit, then fades out. JS toggles
     .at-top/.at-bottom on <body>; CSS re-runs the keyframe each time. */
  .scroll-glow{position:fixed;left:0;right:0;height:4vh;max-height:44px;pointer-events:none;z-index:140;opacity:0}
  /* y-radius 100% keeps the vertical fade ending exactly at the element's far
     edge (no rectangular cut-off); x-radius 65% tapers the sides to near-zero
     at the viewport edges. 30% accent for a softer tint. */
  .scroll-glow.top{top:0;background:radial-gradient(ellipse 65% 100% at 50% 0%,color-mix(in srgb,var(--accent) 30%,transparent),transparent 85%)}
  .scroll-glow.bottom{bottom:0;background:radial-gradient(ellipse 65% 100% at 50% 100%,color-mix(in srgb,var(--accent) 30%,transparent),transparent 85%)}
  @keyframes edgePulse{0%{opacity:0}18%{opacity:1}100%{opacity:0}}
  body.at-top .scroll-glow.top,body.at-bottom .scroll-glow.bottom{animation:edgePulse 1.1s cubic-bezier(.2,.7,.2,1) forwards}
  @media (prefers-reduced-motion:reduce){.scroll-glow{animation:none!important}}
  /* Fallback crossfade for browsers without View Transitions API (Safari <18, older FF).
     Includes SVG primitives so the map's stroke colors fade in sync with the surrounding DOM. */
  body,body *{transition:background-color .35s ease,color .35s ease,border-color .35s ease,fill .35s ease,stroke .35s ease,box-shadow .35s ease,opacity .35s ease}
  /* View Transitions API — full-page snapshot crossfade in modern browsers */
  @supports (view-transition-name:root){
    ::view-transition-old(root),::view-transition-new(root){animation-duration:.4s;animation-timing-function:cubic-bezier(.4,0,.2,1);mix-blend-mode:normal}
    ::view-transition-old(root){animation-name:themeFadeOut}
    ::view-transition-new(root){animation-name:themeFadeIn}
    @keyframes themeFadeOut{to{opacity:0}}
    @keyframes themeFadeIn{from{opacity:0}}
    /* When VT is supported, skip the per-element CSS transitions (VT handles it) */
    .vt-in-flight,.vt-in-flight *{transition:none!important}
  }
  @media (prefers-reduced-motion:reduce){
    body,body *{transition:none!important}
    ::view-transition-old(root),::view-transition-new(root){animation-duration:.01ms!important}
  }
  a{color:var(--accent);text-decoration:none}
  a:hover{opacity:.75}

  .variation{display:none}
  .variation[data-active="true"]{display:block}

  /* Shared teaser container */
  .teaser{background:var(--paper-2);position:relative;overflow:hidden;border-radius:6px}
  .teaser svg{position:absolute;inset:0;width:100%;height:100%}

  /* Theme toggle — small floating icon button, bottom-right */
  #theme-toggle{position:fixed;right:1rem;bottom:1rem;z-index:150;width:40px;height:40px;background:var(--paper);color:var(--ink-soft);border:1px solid var(--rule);border-radius:50%;cursor:pointer;padding:0;box-shadow:0 8px 20px -12px rgba(0,0,0,.25)}
  @media(max-width:640px){#theme-toggle{width:36px;height:36px;right:.75rem;bottom:.75rem}#theme-toggle svg{width:14px;height:14px}}
  #theme-toggle:hover{color:var(--ink);border-color:var(--ink)}
  /* Both icons sit in the exact center of the button; only opacity toggles */
  #theme-toggle svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:opacity .35s ease}
  #theme-toggle .sun{opacity:1}
  #theme-toggle .moon{opacity:0}
  :root.is-dark #theme-toggle .sun{opacity:0}
  :root.is-dark #theme-toggle .moon{opacity:1}
</style>
</head>

<script>
  // Theme toggle: flips between light and dark and remembers the override, but only when the user's
  // choice diverges from the OS preference. Toggling back to match the OS clears the override so the
  // site returns to auto-follow-OS; OS-preference changes then update the site live.
  // Uses the View Transitions API for a full-page snapshot crossfade when the browser supports it
  // (Chrome 111+, Safari 18+, FF 127+); falls back to per-element CSS transitions otherwise.
  (function(){
    const root=document.documentElement;
    const btn=document.getElementById('theme-toggle');
    const mq=matchMedia('(prefers-color-scheme: dark)');
    const reduced=matchMedia('(prefers-reduced-motion: reduce)');
    const resolved=()=>{
      const t=root.getAttribute('data-theme');
      return (t==='light'||t==='dark') ? t : (mq.matches?'dark':'light');
    };
    const sync=()=>root.classList.toggle('is-dark',resolved()==='dark');
    sync();

    const applyTheme=(next)=>{
      // Tri-state-implicit: if `next` matches the current OS preference, treat
      // the click as "release to auto" — clear the override so the @media rule
      // drives colors and the OS listener below can re-sync future changes.
      if((next==='dark')===mq.matches){
        root.removeAttribute('data-theme');
        try{localStorage.removeItem('theme')}catch(e){}
      }else{
        root.setAttribute('data-theme',next);
        try{localStorage.setItem('theme',next)}catch(e){}
      }
      sync();
    };

    btn.addEventListener('click',()=>{
      const next=resolved()==='dark'?'light':'dark';
      if(document.startViewTransition && !reduced.matches){
        // Mark the document so the property-level fallback transitions don't fight the VT snapshot.
        root.classList.add('vt-in-flight');
        const tr=document.startViewTransition(()=>applyTheme(next));
        tr.finished.finally(()=>root.classList.remove('vt-in-flight'));
      }else{
        applyTheme(next);
      }
    });
    const onMQ=()=>{ if(!root.hasAttribute('data-theme')) sync(); };
    if(mq.addEventListener) mq.addEventListener('change',onMQ);
    else if(mq.addListener) mq.addListener(onMQ);
  })();
  // Scroll-boundary glow: add a body class the moment USER SCROLL reaches
  // the top/bottom so the CSS keyframe fires, then remove it after the
  // pulse finishes so re-entering the edge re-triggers the animation.
  //
  // Layout-driven edge arrivals (e.g. the Site-stats panel expanding
  // grid-template-rows:0fr→1fr, a teaser image finishing load, iOS Safari
  // hiding the address bar) must NOT pulse — they're not a navigation the
  // user initiated. We split the handler:
  //   • scroll event   → pulse on false→true transition, then sync state
  //   • resize + ResizeObserver → silently sync state, never pulse
  // The silent sync is essential: without it, a panel that grows the page
  // while the user was already at the bottom would leave wasBottom stuck at
  // true, and the next real scroll-to-bottom wouldn't pulse.
  (function(){
    const body=document.body;
    const EDGE=4;     // px tolerance — iOS Safari can report sub-pixel offsets at the edges
    const HOLD=1200;  // ms — slightly longer than the edgePulse animation (1.1s)
    let topTimer=null, bottomTimer=null;
    // Initialize wasTop/wasBottom to true so the first update() after page load
    // doesn't see a false→true transition and fire the pulse on refresh. The
    // glow still fires on subsequent edge re-entries.
    let wasTop=true, wasBottom=true;
    const compute=()=>{
      const y=window.scrollY||window.pageYOffset||0;
      const doc=document.documentElement;
      const maxY=Math.max(doc.scrollHeight,doc.offsetHeight,body.scrollHeight||0)-window.innerHeight;
      return {nowTop:y<=EDGE, nowBottom:maxY>0 && y>=maxY-EDGE};
    };
    const syncSilent=()=>{
      const {nowTop,nowBottom}=compute();
      wasTop=nowTop;
      wasBottom=nowBottom;
    };
    const onScroll=()=>{
      const {nowTop,nowBottom}=compute();
      // Edge-enter detection: only fire on false→true transitions driven by
      // a real scroll event, so the pulse plays exactly once per user-driven
      // arrival — not on every scroll tick at the edge, not on layout shifts.
      if(nowTop && !wasTop){
        body.classList.add('at-top');
        clearTimeout(topTimer);
        topTimer=setTimeout(()=>body.classList.remove('at-top'),HOLD);
      }
      if(nowBottom && !wasBottom){
        body.classList.add('at-bottom');
        clearTimeout(bottomTimer);
        bottomTimer=setTimeout(()=>body.classList.remove('at-bottom'),HOLD);
      }
      wasTop=nowTop;
      wasBottom=nowBottom;
    };
    syncSilent();
    window.addEventListener('scroll',onScroll,{passive:true});
    window.addEventListener('resize',syncSilent);
    // Catch layout changes that don't produce scroll/resize events — chiefly
    // the stats-panel grid-template-rows transition. Observing documentElement
    // fires on any document-size change (content reflow, image load, etc.).
    if('ResizeObserver' in window){
      new ResizeObserver(syncSilent).observe(document.documentElement);
    }
  })();
</script>
</body>
